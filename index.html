<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<title>Drawing Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;color:#e6fffa;font-family:system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100dvh;overflow:hidden;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.9);z-index:30;}
.overlay.hidden{display:none;}
h1{font-size:2rem;color:#2dd4bf;margin-bottom:0.5rem;}
.subtitle{font-size:0.9rem;color:#8ba8a3;margin-bottom:1.5rem;}
.btn{display:block;width:220px;padding:14px;margin:6px auto;border:2px solid #2dd4bf;background:transparent;color:#2dd4bf;font-size:1rem;font-weight:bold;border-radius:12px;cursor:pointer;transition:all 0.2s;}
.btn:active,.btn:hover{background:#2dd4bf;color:#0a0a0a;}
.room-code{font-size:2.5rem;font-weight:bold;color:#ffd700;letter-spacing:8px;background:#1a2e2a;padding:12px 28px;border-radius:12px;margin:1rem 0;}
.room-input{font-size:1.5rem;text-align:center;letter-spacing:6px;width:200px;padding:12px;background:#1a2e2a;border:2px solid #173832;border-radius:12px;color:#e6fffa;margin:1rem 0;text-transform:uppercase;}
.room-input:focus{border-color:#2dd4bf;outline:none;}
.wait-text{color:#8ba8a3;font-size:0.9rem;animation:pulse 1.5s infinite;}
select{padding:10px;background:#1a2e2a;border:2px solid #173832;border-radius:8px;color:#e6fffa;font-size:1rem;margin:4px;}
#gameArea{display:none;width:100%;max-width:600px;flex-direction:column;align-items:center;}
#gameArea.active{display:flex;}
#topBar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#111;border-bottom:1px solid #173832;}
#topBar .timer{font-size:1.2rem;font-weight:bold;color:#ffd700;}
#topBar .round{font-size:0.85rem;color:#8ba8a3;}
#topBar .word{font-size:1.1rem;font-weight:bold;color:#2dd4bf;letter-spacing:2px;}
#canvasWrap{background:#fff;position:relative;touch-action:none;margin:0 auto;border:2px solid #173832;border-radius:4px;}
#drawCanvas{width:100%;height:100%;display:block;cursor:crosshair;}
#tools{width:100%;display:flex;gap:4px;padding:8px;background:#111;border-top:1px solid #173832;flex-wrap:wrap;justify-content:center;}
.color-btn{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;}
.color-btn.active{border-color:#ffd700;box-shadow:0 0 6px rgba(255,215,0,0.4);}
.size-btn{padding:4px 10px;background:#1a2e2a;border:1px solid #173832;border-radius:6px;color:#e6fffa;font-size:0.8rem;cursor:pointer;}
.size-btn.active{border-color:#2dd4bf;background:#0d3330;}
.tool-btn{padding:6px 14px;background:#1a2e2a;border:1px solid #173832;border-radius:6px;color:#e6fffa;font-size:0.85rem;cursor:pointer;}
.tool-btn:active{background:#2dd4bf;color:#0a0a0a;}
#guessArea{width:100%;padding:8px;background:#111;border-top:1px solid #173832;}
#guessInput{width:100%;padding:10px;background:#1a2e2a;border:2px solid #173832;border-radius:10px;color:#e6fffa;font-size:1rem;}
#guessInput:focus{border-color:#2dd4bf;outline:none;}
#guessInput:disabled{opacity:0.4;}
#chatLog{width:100%;max-height:120px;overflow-y:auto;padding:6px 12px;font-size:0.85rem;}
.chat-msg{padding:2px 0;}.chat-correct{color:#4ade80;font-weight:bold;}.chat-system{color:#ffd700;font-style:italic;}
#scoreboard{width:100%;padding:8px 12px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;font-size:0.8rem;}
.score-item{background:#1a2e2a;padding:4px 10px;border-radius:8px;}.score-name{color:#2dd4bf;}.score-pts{color:#ffd700;margin-left:4px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
</style>
</head>
<body>

<!-- Menu -->
<div id="menuScreen" class="overlay">
  <h1>🎨 Drawing Quiz</h1>
  <p class="subtitle">お絵描きクイズ</p>
  <div style="margin-bottom:8px">
    <input type="text" id="nameInput" placeholder="あなたの名前" maxlength="8" style="padding:10px;background:#1a2e2a;border:2px solid #173832;border-radius:8px;color:#e6fffa;font-size:1rem;text-align:center;width:180px;">
  </div>
  <button class="btn" id="freePlayBtn" style="border-color:#fbbf24;color:#fbbf24">🖌️ フリーお絵描き</button>
  <button class="btn" id="freePlayOnlineBtn" style="border-color:#fbbf24;color:#fbbf24">🖌️ フリーお絵描き（通信）</button>
  <button class="btn" id="createBtn">部屋を作る（クイズ）</button>
  <button class="btn" id="joinBtn">部屋に入る</button>
</div>

<!-- Wait room -->
<div id="waitScreen" class="overlay hidden">
  <h1>🎨 部屋を作成</h1>
  <div class="room-code" id="roomCodeShow">----</div>
  <div id="playerList" style="margin:1rem 0;text-align:center;"></div>
  <p class="wait-text" id="waitMsg">参加者を待っています...</p>
  <button class="btn" id="startGameBtn" style="display:none">ゲーム開始</button>
  <button class="btn" id="cancelBtn" style="margin-top:0.5rem;border-color:#f472b6;color:#f472b6;">キャンセル</button>
</div>

<!-- Join room -->
<div id="joinScreen" class="overlay hidden">
  <h1>🎨 部屋に入る</h1>
  <input type="text" class="room-input" id="joinCodeInput" maxlength="4" placeholder="ABCD">
  <button class="btn" id="joinConfirmBtn">参加する</button>
  <p id="joinError" style="color:#f44;font-size:0.85rem;margin-top:0.5rem"></p>
  <button class="btn" id="joinBackBtn" style="margin-top:0.5rem">戻る</button>
</div>

<!-- Game -->
<div id="gameArea">
  <div id="topBar">
    <span class="round" id="roundInfo">1/4</span>
    <span class="word" id="wordDisplay">---</span>
    <span class="timer" id="timerDisplay">60</span>
  </div>
  <div id="scoreboard"></div>
  <div id="canvasWrap">
    <canvas id="drawCanvas"></canvas>
  </div>
  <div id="tools" style="display:none">
    <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:center;align-items:center">
      <button class="color-btn active" data-color="#000000" style="background:#000"></button>
      <button class="color-btn" data-color="#f44336" style="background:#f44336"></button>
      <button class="color-btn" data-color="#2196f3" style="background:#2196f3"></button>
      <button class="color-btn" data-color="#4caf50" style="background:#4caf50"></button>
      <button class="color-btn" data-color="#ffd700" style="background:#ffd700"></button>
      <button class="color-btn" data-color="#ff9800" style="background:#ff9800"></button>
      <button class="color-btn" data-color="#9c27b0" style="background:#9c27b0"></button>
      <button class="color-btn" data-color="#795548" style="background:#795548"></button>
      <button class="color-btn" data-color="#ffffff" style="background:#fff;border:1px solid #ccc"></button>
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:6px;justify-content:center">
      <span style="font-size:0.75rem;color:#8ba8a3">太さ</span>
      <input type="range" id="penSizeSlider" min="1" max="40" value="3" style="width:120px;accent-color:#2dd4bf">
      <span id="penSizeVal" style="font-size:0.8rem;color:#2dd4bf;min-width:28px">3px</span>
      <button class="tool-btn" id="eraserBtn">消しゴム</button>
      <button class="tool-btn" id="clearBtn">全消し</button>
    </div>
    <div style="display:flex;gap:6px;align-items:center;margin-top:6px;justify-content:center">
      <span style="font-size:0.75rem;color:#8ba8a3">キャンバス</span>
      <select id="canvasSizeSelect">
        <option value="4:3">4:3</option>
        <option value="1:1">正方形</option>
        <option value="16:9">16:9</option>
        <option value="3:4">3:4 縦</option>
      </select>
      <button class="tool-btn" id="saveBtn">💾 保存</button>
      <button class="tool-btn" id="shareImgBtn">📤 シェア</button>
    </div>
  </div>
  <div id="chatLog"></div>
  <div id="guessArea">
    <input type="text" id="guessInput" placeholder="答えを入力..." autocomplete="off">
  </div>
</div>

<!-- Result -->
<div id="resultScreen" class="overlay hidden">
  <h1>🏆 結果発表</h1>
  <div id="finalScores" style="margin:1rem 0;font-size:1.1rem;"></div>
  <button class="btn" id="continueBtn" style="display:none">🎨 もう5問やる</button>
  <button class="btn" id="backMenuBtn" style="border-color:#f472b6;color:#f472b6">タイトルに戻る</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA8l-oe2BqZihiVVtizEl1fMGqhy8W-JzA",authDomain:"spear-battle.firebaseapp.com",
  databaseURL:"https://spear-battle-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"spear-battle",storageBucket:"spear-battle.firebasestorage.app",
  messagingSenderId:"696563248470",appId:"1:696563248470:web:158790c082a6cf408dbaf7"
});
const db = firebase.database();

// Word list
const WORDS = [
  // 動物
  '犬','猫','うさぎ','馬','象','キリン','ライオン','ペンギン','パンダ','カエル',
  'イルカ','クジラ','サメ','タコ','カニ','蝶','てんとう虫','ヘビ','恐竜','ゴリラ',
  // 食べ物
  'りんご','バナナ','ぶどう','すいか','いちご','みかん','さくらんぼ','メロン',
  'ラーメン','寿司','ピザ','ハンバーガー','ケーキ','アイス','おにぎり','カレー',
  'たこ焼き','餃子','パスタ','ドーナツ','パン','目玉焼き','天ぷら','チョコレート',
  // 乗り物
  '車','飛行機','電車','自転車','バス','船','ヘリコプター','ロケット','バイク','新幹線',
  // 自然
  '太陽','月','星','雨','虹','雪','雷','火山','滝','波',
  '山','海','川','花','木','サボテン','ひまわり','チューリップ','桜','紅葉',
  // 建物・場所
  '家','城','東京タワー','遊園地','学校','病院','橋','灯台','テント','ピラミッド',
  // スポーツ
  'サッカー','野球','テニス','バスケ','水泳','スキー','サーフィン','ボウリング','卓球','ゴルフ',
  // 楽器・音楽
  'ギター','ピアノ','ドラム','バイオリン','トランペット','マイク',
  // 道具・日用品
  'カメラ','テレビ','スマホ','傘','時計','メガネ','鍵','はさみ','ほうき','電球',
  '本','鉛筆','消しゴム','リュック','帽子','靴','指輪','風船',
  // ファンタジー
  'おばけ','忍者','王冠','剣','盾','魔法使い','ドラゴン','ロボット','宇宙人','天使',
  // 季節・イベント
  '雪だるま','クリスマスツリー','花火','お正月','ハロウィン','こいのぼり','七夕',
  // その他
  'ハート','音符','地球','望遠鏡','パレット','サングラス','ネクタイ','王様','人魚','UFO',
];

// State
let myName='', myId='', roomCode='', roomRef=null, isHost=false;
let playersList=[], currentDrawer=0, currentWord='', roundNum=0, totalRounds=0;
let scores={}, guessedPlayers=new Set(), timerInterval=null, timeLeft=60;
let freePlayMode=false;

// Canvas
const canvas=document.getElementById('drawCanvas');
const ctx=canvas.getContext('2d');
let drawing=false, lastX=0, lastY=0, penColor='#000000', penSize=3, isEraser=false;
let strokeBuffer=[];

// resizeCanvas defined below with canvasSizeSelect

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:(t.clientX-r.left)/(r.width)*canvas.width/2, y:(t.clientY-r.top)/(r.height)*canvas.height/2};
}

function startDraw(e){e.preventDefault();drawing=true;const p=getPos(e);lastX=p.x;lastY=p.y;}
function moveDraw(e){
  e.preventDefault();if(!drawing)return;
  const p=getPos(e);
  ctx.strokeStyle=isEraser?'#ffffff':penColor;ctx.lineWidth=isEraser?20:penSize;
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(p.x,p.y);ctx.stroke();
  const stroke={x1:lastX,y1:lastY,x2:p.x,y2:p.y,c:isEraser?'#ffffff':penColor,s:isEraser?20:penSize};
  strokeBuffer.push(stroke);
  lastX=p.x;lastY=p.y;
}
function endDraw(){
  if(!drawing)return; drawing=false;
  if(strokeBuffer.length>0&&roomRef){
    roomRef.child('strokes').push(strokeBuffer);
    strokeBuffer=[];
  }
}

canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',moveDraw);
canvas.addEventListener('mouseup',endDraw);canvas.addEventListener('mouseleave',endDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',moveDraw,{passive:false});
canvas.addEventListener('touchend',endDraw);

// Tools
document.querySelectorAll('.color-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.color-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); penColor=b.dataset.color; isEraser=false;
    document.getElementById('eraserBtn').style.background='';
  });
});
document.getElementById('penSizeSlider').addEventListener('input',e=>{
  penSize=parseInt(e.target.value);
  document.getElementById('penSizeVal').textContent=penSize+'px';
});
document.getElementById('eraserBtn').addEventListener('click',()=>{
  isEraser=!isEraser;
  document.getElementById('eraserBtn').style.background=isEraser?'#2dd4bf':'';
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width/2,canvas.height/2);
  if(roomRef) roomRef.child('strokes').remove();
});

// Generate room code
function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}

// UI helpers
function hideAll(){['menuScreen','waitScreen','joinScreen','resultScreen'].forEach(id=>document.getElementById(id).classList.add('hidden'));document.getElementById('gameArea').classList.remove('active');}
function showScreen(id){hideAll();document.getElementById(id).classList.remove('hidden');}
function addChat(msg,cls){const d=document.getElementById('chatLog');d.innerHTML+=`<div class="chat-msg ${cls||''}">${msg}</div>`;d.scrollTop=d.scrollHeight;}

// Create room
document.getElementById('createBtn').addEventListener('click',()=>{
  myName=document.getElementById('nameInput').value.trim()||'Player';
  myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  roomCode=genCode(); isHost=true;
  roomRef=db.ref('draw_rooms/'+roomCode);
  roomRef.set({host:myId,status:'waiting',players:{[myId]:{name:myName,score:0}},round:0,drawer:0,word:'',strokes:null,guessed:{},chat:null});
  roomRef.onDisconnect().remove();
  document.getElementById('roomCodeShow').textContent=roomCode;
  showScreen('waitScreen');
  document.getElementById('startGameBtn').style.display='none';
  listenWaitRoom();
});

// Join room
document.getElementById('joinBtn').addEventListener('click',()=>{showScreen('joinScreen');document.getElementById('joinCodeInput').value='';document.getElementById('joinError').textContent='';});
document.getElementById('joinBackBtn').addEventListener('click',()=>showScreen('menuScreen'));
document.getElementById('joinConfirmBtn').addEventListener('click',()=>{
  const code=document.getElementById('joinCodeInput').value.toUpperCase().trim();
  if(code.length!==4){document.getElementById('joinError').textContent='4文字の合言葉を入力';return;}
  const ref=db.ref('draw_rooms/'+code);
  ref.once('value',s=>{
    const d=s.val();
    if(!d){document.getElementById('joinError').textContent='部屋が見つかりません';return;}
    if(d.status!=='waiting'&&d.status!=='freeplay'&&d.status!=='freeplay_started'){document.getElementById('joinError').textContent='ゲーム中です';return;}
    const pCount=Object.keys(d.players||{}).length;
    if(pCount>=6){document.getElementById('joinError').textContent='満員です（最大6人）';return;}
    myName=document.getElementById('nameInput').value.trim()||'Player';
    myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    roomCode=code; roomRef=ref; isHost=false;
    ref.child('players/'+myId).set({name:myName,score:0});
    ref.child('players/'+myId).onDisconnect().remove();
    // ゲスト入室時、freePlayMode を明示リセットしてから status に応じて設定
    // (古いセッション state を引きずってクイズと混線するのを防ぐ)
    freePlayMode=false;
    if(d.status==='freeplay_started'){
      freePlayMode=true; startFreePlayOnline(); return;
    }
    if(d.status==='freeplay'){
      freePlayMode=true;
    }
    showScreen('waitScreen');
    document.getElementById('roomCodeShow').textContent=roomCode;
    document.getElementById('startGameBtn').style.display='none';
    listenWaitRoom();
  });
});
document.getElementById('joinCodeInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('joinConfirmBtn').click();});

// Wait room
function listenWaitRoom(){
  roomRef.child('players').on('value',s=>{
    const p=s.val()||{};
    playersList=Object.entries(p).map(([id,d])=>({id,name:d.name,score:d.score||0}));
    document.getElementById('playerList').innerHTML=playersList.map(x=>`<span style="color:#2dd4bf;margin:0 6px">${x.name}</span>`).join('');
    document.getElementById('waitMsg').textContent=`${playersList.length}人 参加中`;
    if(isHost&&playersList.length>=2&&playersList.length<=6) document.getElementById('startGameBtn').style.display='block';
    if(playersList.length>=6) document.getElementById('waitMsg').textContent=`${playersList.length}人 参加中（満員）`;
  });
  roomRef.child('status').on('value',s=>{
    const v=s.val();
    // freePlayMode=true なら 'playing' イベントを無視（クイズ誤起動防止）
    if(v==='playing' && !freePlayMode) startPlaying();
    else if(v==='freeplay_started') { freePlayMode=true; startFreePlayOnline(); }
  });
}

document.getElementById('startGameBtn').addEventListener('click',()=>{
  if(freePlayMode) return;
  if(!roomRef) return;
  // 念のため Firebase の現在の status を再確認: フリーお絵描き部屋なら playing に上書きしない
  roomRef.once('value',s=>{
    const d=s.val();
    if(d && (d.status==='freeplay' || d.status==='freeplay_started')) return;
    totalRounds=playersList.length*5;
    roomRef.update({status:'playing',round:0,totalRounds:totalRounds});
    startNewRound(0);
  });
});
document.getElementById('cancelBtn').addEventListener('click',()=>{if(roomRef){roomRef.remove();roomRef=null;}showScreen('menuScreen');});

// Game
function startPlaying(){
  hideAll();document.getElementById('gameArea').classList.add('active');
  resizeCanvas();scores={};playersList.forEach(p=>scores[p.id]=0);
  roomRef.child('round').on('value',s=>{
    const r=s.val(); if(r===null)return;
    roomRef.once('value',snap=>{
      const d=snap.val();if(!d)return;
      playersList=Object.entries(d.players||{}).map(([id,v])=>({id,name:v.name,score:v.score||0}));
      totalRounds=d.totalRounds||playersList.length;
      roundNum=d.round;
      currentDrawer=roundNum%playersList.length;
      currentWord=d.word||'';
      guessedPlayers=new Set(Object.keys(d.guessed||{}));
      startRoundUI();
    });
  });
  listenGame();
}

function startNewRound(round){
  const word=WORDS[Math.floor(Math.random()*WORDS.length)];
  roomRef.update({round,word,strokes:null,guessed:{},chat:null});
}

function startRoundUI(){
  const amDrawer=playersList[currentDrawer]&&playersList[currentDrawer].id===myId;
  document.getElementById('roundInfo').textContent=`${roundNum+1}/${totalRounds}`;
  if(amDrawer){
    document.getElementById('wordDisplay').textContent=`お題: ${currentWord}`;
    document.getElementById('tools').style.display='flex';
    document.getElementById('guessInput').disabled=true;
    document.getElementById('guessInput').placeholder='あなたが出題者です';
    canvas.style.pointerEvents='auto';
  }else{
    document.getElementById('wordDisplay').textContent='_ '.repeat(currentWord.length);
    document.getElementById('tools').style.display='none';
    document.getElementById('guessInput').disabled=guessedPlayers.has(myId);
    document.getElementById('guessInput').placeholder=guessedPlayers.has(myId)?'正解済み!':'答えを入力...';
    canvas.style.pointerEvents='none';
  }
  ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width/2,canvas.height/2);
  document.getElementById('chatLog').innerHTML='';
  addChat(`${playersList[currentDrawer]?.name||'?'} が描きます!`,'chat-system');
  updateScoreboard();
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);
  if(freePlayMode){
    document.getElementById('timerDisplay').textContent='∞';
    document.getElementById('timerDisplay').style.color='#2dd4bf';
    return;
  }
  timeLeft=60;
  document.getElementById('timerDisplay').textContent=timeLeft;
  timerInterval=setInterval(()=>{
    timeLeft--;document.getElementById('timerDisplay').textContent=timeLeft;
    document.getElementById('timerDisplay').style.color=timeLeft<=10?'#f44':'#ffd700';
    if(timeLeft<=0){clearInterval(timerInterval);if(isHost)endRound();}
  },1000);
}

function endRound(){
  clearInterval(timerInterval);
  roomRef.child('chat').push({name:'システム',msg:`答え: ${currentWord}`,system:true});
  setTimeout(()=>{
    if(roundNum+1>=totalRounds){roomRef.update({status:'finished'});}
    else startNewRound(roundNum+1);
  },3000);
}

function listenGame(){
  // Strokes
  roomRef.child('strokes').on('child_added',s=>{
    const strokes=s.val();if(!strokes)return;
    strokes.forEach(st=>{
      ctx.strokeStyle=st.c;ctx.lineWidth=st.s;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(st.x1,st.y1);ctx.lineTo(st.x2,st.y2);ctx.stroke();
    });
  });
  roomRef.child('strokes').on('value',s=>{
    if(s.val()===null){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width/2,canvas.height/2);}
  });

  // Chat
  roomRef.child('chat').on('child_added',s=>{
    const m=s.val();if(!m)return;
    if(m.system) addChat(m.msg,'chat-system');
    else if(m.correct) addChat(`🎉 ${m.name} が正解!`,'chat-correct');
    else addChat(`${m.name}: ${m.msg}`);
  });

  // Guessed
  roomRef.child('guessed').on('child_added',s=>{
    if(s.key===myId){
      document.getElementById('guessInput').disabled=true;
      document.getElementById('guessInput').placeholder='正解済み!';
    }
    guessedPlayers.add(s.key);
    // Check all guessed
    if(isHost&&guessedPlayers.size>=playersList.length-1){
      setTimeout(()=>endRound(),1500);
    }
  });

  // Scores
  roomRef.child('players').on('value',s=>{
    const p=s.val()||{};
    playersList=Object.entries(p).map(([id,v])=>({id,name:v.name,score:v.score||0}));
    updateScoreboard();
  });

  // Status
  roomRef.child('status').on('value',s=>{
    if(s.val()==='finished') showResults();
  });
}

// Guess
document.getElementById('guessInput').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const input=document.getElementById('guessInput');
  const guess=input.value.trim();input.value='';
  if(!guess)return;

  if(guess===currentWord){
    const pts=Math.max(10,Math.floor(timeLeft*1.5));
    roomRef.child('guessed/'+myId).set(true);
    roomRef.child('chat').push({name:myName,msg:guess,correct:true});
    roomRef.child('players/'+myId+'/score').transaction(v=>(v||0)+pts);
    // Bonus for drawer
    roomRef.child('players/'+playersList[currentDrawer].id+'/score').transaction(v=>(v||0)+5);
  }else{
    roomRef.child('chat').push({name:myName,msg:guess,correct:false});
  }
});

function updateScoreboard(){
  const sb=document.getElementById('scoreboard');
  sb.innerHTML=playersList.sort((a,b)=>b.score-a.score).map(p=>
    `<span class="score-item"><span class="score-name">${p.name}</span><span class="score-pts">${p.score}pt</span></span>`
  ).join('');
}

function showResults(){
  clearInterval(timerInterval);hideAll();
  document.getElementById('resultScreen').classList.remove('hidden');
  const sorted=[...playersList].sort((a,b)=>b.score-a.score);
  const total=sorted.reduce((s,p)=>s+p.score,0);
  document.getElementById('finalScores').innerHTML=
    sorted.map((p,i)=>
      `<div style="margin:8px 0;font-size:${i===0?'1.4rem':'1rem'};color:${i===0?'#ffd700':i===1?'#c0c0c0':'#cd7f32'}">${i===0?'🏆':i===1?'🥈':'🥉'} ${p.name} - ${p.score}pt</div>`
    ).join('')+
    `<div style="margin-top:16px;padding-top:12px;border-top:1px solid #173832;color:#8ba8a3;font-size:0.9rem">全員の合計: ${total}pt</div>`;

  // Show continue button only if online (room still exists)
  const contBtn=document.getElementById('continueBtn');
  if(roomRef&&!freePlayMode){
    contBtn.style.display='block';
  }else{
    contBtn.style.display='none';
  }
}

// Continue (another 5 rounds in same room)
document.getElementById('continueBtn').addEventListener('click',()=>{
  if(!roomRef||!isHost) return;
  // Reset scores for new set, keep cumulative
  totalRounds=playersList.length*5;
  roomRef.update({status:'playing',round:0,totalRounds:totalRounds,guessed:{},strokes:null,chat:null});
  startNewRound(0);
  hideAll();document.getElementById('gameArea').classList.add('active');
  resizeCanvas();
});

// Listen for continue from host (non-host)
if(!isHost&&roomRef){
  roomRef.child('status').on('value',s=>{
    if(s.val()==='playing'&&document.getElementById('resultScreen').classList.contains('hidden')===false){
      hideAll();document.getElementById('gameArea').classList.add('active');
      resizeCanvas();
    }
  });
}

document.getElementById('backMenuBtn').addEventListener('click',()=>{
  if(roomRef){roomRef.remove();roomRef=null;}freePlayMode=false;showScreen('menuScreen');
});

// Free play (solo)
document.getElementById('freePlayBtn').addEventListener('click',()=>{
  freePlayMode=true; roomRef=null;
  hideAll(); document.getElementById('gameArea').classList.add('active');
  resizeCanvas();
  document.getElementById('topBar').style.display='none';
  document.getElementById('scoreboard').style.display='none';
  document.getElementById('guessArea').style.display='none';
  document.getElementById('chatLog').style.display='none';
  document.getElementById('tools').style.display='flex';
  canvas.style.pointerEvents='auto';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width/2,canvas.height/2);
});

// Free play (online)
document.getElementById('freePlayOnlineBtn').addEventListener('click',()=>{
  myName=document.getElementById('nameInput').value.trim()||'Player';
  myId=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  freePlayMode=true; isHost=true;
  roomCode=genCode();
  roomRef=db.ref('draw_rooms/'+roomCode);
  roomRef.set({host:myId,status:'freeplay',players:{[myId]:{name:myName,score:0}},strokes:null,chat:null});
  roomRef.onDisconnect().remove();
  document.getElementById('roomCodeShow').textContent=roomCode;
  showScreen('waitScreen');
  document.getElementById('startGameBtn').style.display='none';
  document.getElementById('waitMsg').textContent='参加者を待っています...（1人でも開始可）';

  // Show start button immediately for freeplay
  setTimeout(()=>{document.getElementById('startGameBtn').style.display='block';document.getElementById('startGameBtn').textContent='お絵描き開始';},500);

  roomRef.child('players').on('value',s=>{
    const p=s.val()||{};
    playersList=Object.entries(p).map(([id,d])=>({id,name:d.name,score:d.score||0}));
    document.getElementById('playerList').innerHTML=playersList.map(x=>`<span style="color:#2dd4bf;margin:0 6px">${x.name}</span>`).join('');
    document.getElementById('waitMsg').textContent=`${playersList.length}人 参加中`;
  });
  roomRef.child('status').on('value',s=>{
    if(s.val()==='freeplay_started') startFreePlayOnline();
  });
});

// Override start button for freeplay online
const origStartClick = document.getElementById('startGameBtn').onclick;
document.getElementById('startGameBtn').addEventListener('click',()=>{
  if(freePlayMode&&isHost){
    roomRef.update({status:'freeplay_started'});
    startFreePlayOnline();
    return;
  }
});

function startFreePlayOnline(){
  hideAll(); document.getElementById('gameArea').classList.add('active');
  freePlayMode=true;
  resizeCanvas();
  document.getElementById('topBar').style.display='flex';
  document.getElementById('roundInfo').textContent='Free';
  document.getElementById('wordDisplay').textContent='フリーお絵描き';
  document.getElementById('timerDisplay').textContent='∞';
  document.getElementById('timerDisplay').style.color='#2dd4bf';
  document.getElementById('scoreboard').style.display='none';
  document.getElementById('guessArea').style.display='block';
  document.getElementById('guessInput').placeholder='チャット...';
  document.getElementById('guessInput').disabled=false;
  document.getElementById('chatLog').style.display='block';
  document.getElementById('chatLog').innerHTML='';
  document.getElementById('tools').style.display='flex';
  canvas.style.pointerEvents='auto';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width/2,canvas.height/2);
  addChat('フリーお絵描き開始！全員描けます','chat-system');

  // Listen strokes
  roomRef.child('strokes').on('child_added',s=>{
    const strokes=s.val();if(!strokes)return;
    strokes.forEach(st=>{
      ctx.strokeStyle=st.c;ctx.lineWidth=st.s;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.beginPath();ctx.moveTo(st.x1,st.y1);ctx.lineTo(st.x2,st.y2);ctx.stroke();
    });
  });
  roomRef.child('strokes').on('value',s=>{
    if(s.val()===null){ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width/2,canvas.height/2);}
  });
  // Chat
  roomRef.child('chat').on('child_added',s=>{
    const m=s.val();if(!m)return;
    if(m.system) addChat(m.msg,'chat-system');
    else addChat(`${m.name}: ${m.msg}`);
  });
}

// Freeplay online chat (reuse guess input)
const origGuessHandler = document.getElementById('guessInput').onkeydown;
document.getElementById('guessInput').addEventListener('keydown',e=>{
  if(freePlayMode&&roomRef&&e.key==='Enter'){
    const input=document.getElementById('guessInput');
    const msg=input.value.trim();input.value='';
    if(msg) roomRef.child('chat').push({name:myName,msg,correct:false});
    e.stopImmediatePropagation();
  }
},true);

// Canvas size change
document.getElementById('canvasSizeSelect').addEventListener('change',e=>{
  const [w,h] = e.target.value.split(':').map(Number);
  canvasRatio = w/h;
  resizeCanvas();
});
let canvasRatio = 4/3;
function resizeCanvas(){
  const wrap=document.getElementById('canvasWrap');
  const maxW=Math.min(window.innerWidth-16, 600);
  const maxH=window.innerHeight*0.5;
  let cw=maxW, ch=maxW/canvasRatio;
  if(ch>maxH){ch=maxH;cw=ch*canvasRatio;}
  wrap.style.width=cw+'px'; wrap.style.height=ch+'px';
  // Save current image
  const imgData=canvas.width>0?ctx.getImageData(0,0,canvas.width,canvas.height):null;
  canvas.width=cw*2; canvas.height=ch*2;
  ctx.scale(2,2); ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch);
  if(imgData) ctx.putImageData(imgData,0,0);
}

// Save as JPG
document.getElementById('saveBtn').addEventListener('click',()=>{
  const link=document.createElement('a');
  link.download='drawing-'+Date.now()+'.jpg';
  const tmpCanvas=document.createElement('canvas');
  tmpCanvas.width=canvas.width; tmpCanvas.height=canvas.height;
  const tmpCtx=tmpCanvas.getContext('2d');
  tmpCtx.fillStyle='#fff'; tmpCtx.fillRect(0,0,tmpCanvas.width,tmpCanvas.height);
  tmpCtx.drawImage(canvas,0,0);
  link.href=tmpCanvas.toDataURL('image/jpeg',0.9);
  link.click();
});

// Share image
document.getElementById('shareImgBtn').addEventListener('click',async()=>{
  const tmpCanvas=document.createElement('canvas');
  tmpCanvas.width=canvas.width; tmpCanvas.height=canvas.height;
  const tmpCtx=tmpCanvas.getContext('2d');
  tmpCtx.fillStyle='#fff'; tmpCtx.fillRect(0,0,tmpCanvas.width,tmpCanvas.height);
  tmpCtx.drawImage(canvas,0,0);
  tmpCanvas.toBlob(async blob=>{
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],'drawing.jpg',{type:'image/jpeg'});
      const data={title:'Drawing Quiz',text:'お絵描きクイズで描いたよ！',url:'https://mochibullet.github.io/drawing-quiz/',files:[file]};
      if(navigator.canShare(data)){try{await navigator.share(data);}catch(e){}}
      else{try{await navigator.share({title:'Drawing Quiz',text:'お絵描きクイズで描いたよ！',url:'https://mochibullet.github.io/drawing-quiz/'});}catch(e){}}
    }else{
      navigator.clipboard.writeText('お絵描きクイズで描いたよ！ https://mochibullet.github.io/drawing-quiz/').then(()=>alert('リンクをコピーしました！'));
    }
  },'image/jpeg',0.9);
});

// Keep alive in background (prevent Firebase disconnect)
document.addEventListener('visibilitychange',()=>{
  if(roomRef&&!document.hidden){
    roomRef.child('players/'+myId+'/online').set(true);
  }
});
// Prevent sleep disconnect with periodic ping
setInterval(()=>{
  if(roomRef&&myId){
    roomRef.child('players/'+myId+'/lastSeen').set(Date.now());
  }
},30000);

window.addEventListener('resize',()=>{if(document.getElementById('gameArea').classList.contains('active'))resizeCanvas();});
</script>
